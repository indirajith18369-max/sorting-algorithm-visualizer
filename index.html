<!DOCTYPE html>
<html>
<head>
<title>Algorithm Visualizer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
<header class="header">
<h1>⚡ Algorithm Visualizer</h1>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('sorting',this)">
Sorting
</button>
<button class="tab-btn" onclick="switchTab('graph',this)">
Graph
</button>
</div>
</header>
<div class="main-layout">
<!-- LEFT PANEL -->
<div class="panel-left">
<div class="ctrl-section">
<label class="ctrl-label">
Algorithm
</label>
<select id="algoSelect" onchange="updateComplexity()">
</select>
</div>
<div class="ctrl-section" id="sizeCtrl">
<label class="ctrl-label">
Array Size
</label>
<input type="range" id="sizeSlider" min="10" max="50" value="30">
</div>
<div class="ctrl-section">
<label class="ctrl-label">
Speed
</label>
<input type="range" id="speedSlider" min="1" max="100" value="50">
</div>
<div class="btn-group">
<button class="btn btn-generate" onclick="generate()">
Generate
</button>
<button class="btn btn-start" onclick="start()">
Start
</button>
<button class="btn btn-pause" onclick="pauseResume()">
Pause
</button>
<button class="btn btn-reset" onclick="resetVisualizer()">
Reset
</button>
</div>
</div>
<!-- CENTER PANEL -->
<div class="panel-center">
<div id="vizArea" class="viz-area">
</div>
</div>
<!-- RIGHT PANEL -->
<div class="panel-right">
<h2 class="table-title">
Complexity
</h2>
<table>
<tr>
<th>Type</th>
<th>Value</th>
</tr>
<tr>
<td>Time</td>
<td id="timeComplexity">O(n²)</td>
</tr>
<tr>
<td>Space</td>
<td id="spaceComplexity">O(1)</td>
</tr>
</table>
</div>
</div>
<!-- BOTTOM PANEL -->
<div class="info-bar">
<div class="info-item">
<span class="info-label">
Comparisons:
</span>
<span class="info-value" id="comparisons">
0
</span>
</div>
<div class="info-item">
<span class="info-label">
Swaps:
</span>
<span class="info-value" id="swaps">
0
</span>
</div>
<div class="info-item">
<span class="info-label">
Status:
</span>
<span class="info-value" id="status">
Idle
</span>
</div>
</div>
</div>
<script>
var currentTab='sorting';
var array=[];
var delay=50;
var paused=false;
var comparisons=0;
var swaps=0;
/* Algorithms */
var sortingAlgorithms=[
['bubble','Bubble Sort','O(n²)','O(1)'],
['selection','Selection Sort','O(n²)','O(1)'],
['insertion','Insertion Sort','O(n²)','O(1)'],
['merge','Merge Sort','O(n log n)','O(n)'],
['quick','Quick Sort','O(n log n)','O(log n)'],
['heap','Heap Sort','O(n log n)','O(1)'],
['shell','Shell Sort','O(n log n)','O(1)'],
['counting','Counting Sort','O(n+k)','O(k)'],
['radix','Radix Sort','O(nk)','O(n+k)'],
['tim','Tim Sort','O(n log n)','O(n)']
];
var graphAlgorithms=[
['bfs','BFS','O(V+E)','O(V)'],
['dfs','DFS','O(V+E)','O(V)'],
['dijkstra','Dijkstra','O(V²)','O(V)']
];
/* Change Tab */
function switchTab(tab,btn){
currentTab=tab;
var tabs=document.getElementsByClassName('tab-btn');
for(var i=0;i<tabs.length;i++){
tabs[i].classList.remove('active');
}
btn.classList.add('active');
if(tab=='sorting'){
document.getElementById('sizeCtrl').style.display='block';
}
else{
document.getElementById('sizeCtrl').style.display='none';
}
fillAlgorithms();
generate();
}
/* Load Algorithms */
function fillAlgorithms(){
var select=document.getElementById('algoSelect');
select.innerHTML='';
var list;
if(currentTab=='sorting'){
list=sortingAlgorithms;
}
else{
list=graphAlgorithms;
}
for(var i=0;i<list.length;i++){
var option=document.createElement('option');
option.value=list[i][0];
option.innerHTML=list[i][1];
select.appendChild(option);
}
updateComplexity();
}
/* Complexity */
function updateComplexity(){
var algo=document.getElementById('algoSelect').value;
var list;
if(currentTab=='sorting'){
list=sortingAlgorithms;
}
else{
list=graphAlgorithms;
}
for(var i=0;i<list.length;i++){
if(list[i][0]==algo){
document.getElementById('timeComplexity').innerHTML=list[i][2];
document.getElementById('spaceComplexity').innerHTML=list[i][3];
}
}
}
/* Generate */
function generate(){
if(currentTab=='sorting'){
generateArray();
}
else{
generateGraph();
}
}
/* Array */
function generateArray(){
array=[];
var size=document.getElementById('sizeSlider').value;
for(var i=0;i<size;i++){
array.push(Math.floor(Math.random()*300)+20);
}
drawBars();
}
/* Draw Bars */
function drawBars(a,b){
var area=document.getElementById('vizArea');
area.innerHTML='';
for(var i=0;i<array.length;i++){
var bar=document.createElement('div');
bar.className='bar';
if(i==a || i==b){
bar.classList.add('active');
}
bar.style.height=array[i]+'px';
area.appendChild(bar);
}
}
/* Graph */
function generateGraph(){
var area=document.getElementById('vizArea');
area.innerHTML='Graph Visualization';
}
/* Delay */
function sleep(ms){
return new Promise(function(resolve){
setTimeout(resolve,ms);
});
}
/* Bubble Sort */
async function bubbleSort(){
var n=array.length;
for(var i=0;i<n-1;i++){
for(var j=0;j<n-i-1;j++){
while(paused){
await sleep(100);
}
comparisons++;
updateStats();
drawBars(j,j+1);
await sleep(delay);
if(array[j]>array[j+1]){
var temp=array[j];
array[j]=array[j+1];
array[j+1]=temp;
swaps++;
updateStats();
drawBars(j,j+1);
await sleep(delay);
}
}
}
drawBars();
}
/* Start */
async function start(){
comparisons=0;
swaps=0;
updateStats();
document.getElementById('status').innerHTML='Running';
delay=101-document.getElementById('speedSlider').value;
var algo=document.getElementById('algoSelect').value;
if(algo=='bubble'){
await bubbleSort();
}
document.getElementById('status').innerHTML='Completed';
}
/* Pause */
function pauseResume(){
paused=!paused;
if(paused){
document.getElementById('status').innerHTML='Paused';
}
else{
document.getElementById('status').innerHTML='Running';
}
}
/* Reset */
function resetVisualizer(){
paused=false;
comparisons=0;
swaps=0;
updateStats();
document.getElementById('status').innerHTML='Idle';
generate();
}
/* Update Stats */
function updateStats(){
document.getElementById('comparisons').innerHTML=comparisons;
document.getElementById('swaps').innerHTML=swaps;
}
/* Start Project */
fillAlgorithms();
generate();
</script>
</body>
</html>
